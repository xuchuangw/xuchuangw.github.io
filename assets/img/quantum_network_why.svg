<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="'Inter', 'Segoe UI', Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="440" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="36" fill="#0f172a" font-size="20" text-anchor="middle" font-weight="700">Why quantum networks?</text>
  <text x="400" y="58" fill="#64748b" font-size="13" text-anchor="middle">Three flagship applications drive the field.</text>

  <!-- =========================== Card 1: Distributed Quantum Computing =========================== -->
  <g>
    <rect x="30" y="84" width="240" height="320" rx="12" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
    <rect x="30" y="84" width="240" height="6" rx="3" fill="#7c3aed"/>

    <!-- Icon: four chips interconnected by entanglement -->
    <g transform="translate(150, 175)">
      <!-- chips -->
      <rect x="-50" y="-30" width="38" height="28" rx="5" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5"/>
      <text x="-31" y="-12" fill="#5b21b6" font-size="12" text-anchor="middle" font-weight="700">QPU</text>
      <rect x="12" y="-30" width="38" height="28" rx="5" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5"/>
      <text x="31" y="-12" fill="#5b21b6" font-size="12" text-anchor="middle" font-weight="700">QPU</text>
      <rect x="-50" y="10" width="38" height="28" rx="5" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5"/>
      <text x="-31" y="28" fill="#5b21b6" font-size="12" text-anchor="middle" font-weight="700">QPU</text>
      <rect x="12" y="10" width="38" height="28" rx="5" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5"/>
      <text x="31" y="28" fill="#5b21b6" font-size="12" text-anchor="middle" font-weight="700">QPU</text>
      <!-- entanglement edges -->
      <line x1="-12" y1="-16" x2="12" y2="-16" stroke="#7c3aed" stroke-width="2"/>
      <line x1="-12" y1="24" x2="12" y2="24" stroke="#7c3aed" stroke-width="2"/>
      <line x1="-31" y1="-2" x2="-31" y2="10" stroke="#7c3aed" stroke-width="2"/>
      <line x1="31" y1="-2" x2="31" y2="10" stroke="#7c3aed" stroke-width="2"/>
      <line x1="-12" y1="-16" x2="12" y2="24" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="3,3"/>
      <line x1="12" y1="-16" x2="-12" y2="24" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="3,3"/>
    </g>

    <text x="150" y="260" fill="#1e1b4b" font-size="15" text-anchor="middle" font-weight="700">Distributed</text>
    <text x="150" y="280" fill="#1e1b4b" font-size="15" text-anchor="middle" font-weight="700">quantum computing</text>

    <text x="150" y="310" fill="#475569" font-size="12" text-anchor="middle">Link many small QPUs into</text>
    <text x="150" y="328" fill="#475569" font-size="12" text-anchor="middle">one large virtual machine —</text>
    <text x="150" y="346" fill="#475569" font-size="12" text-anchor="middle">a scalable path to</text>
    <text x="150" y="364" fill="#475569" font-size="12" text-anchor="middle">fault-tolerant computation.</text>

    <text x="150" y="390" fill="#7c3aed" font-size="11" text-anchor="middle" font-weight="600" letter-spacing="0.5">SCALE</text>
  </g>

  <!-- =========================== Card 2: Distributed Quantum Sensing =========================== -->
  <g>
    <rect x="280" y="84" width="240" height="320" rx="12" fill="#ecfeff" stroke="#67e8f9" stroke-width="1.5"/>
    <rect x="280" y="84" width="240" height="6" rx="3" fill="#0891b2"/>

    <!-- Icon: sensor array connected by entanglement, with signal -->
    <g transform="translate(400, 175)">
      <!-- baseline -->
      <line x1="-70" y1="20" x2="70" y2="20" stroke="#a5f3fc" stroke-width="1.5"/>
      <!-- sensors -->
      <circle cx="-60" cy="0" r="14" fill="#ffffff" stroke="#0891b2" stroke-width="2"/>
      <text x="-60" y="4" fill="#0e7490" font-size="11" text-anchor="middle" font-weight="700">S₁</text>
      <circle cx="0" cy="-22" r="14" fill="#ffffff" stroke="#0891b2" stroke-width="2"/>
      <text x="0" y="-18" fill="#0e7490" font-size="11" text-anchor="middle" font-weight="700">S₂</text>
      <circle cx="60" cy="0" r="14" fill="#ffffff" stroke="#0891b2" stroke-width="2"/>
      <text x="60" y="4" fill="#0e7490" font-size="11" text-anchor="middle" font-weight="700">S₃</text>
      <!-- entanglement arcs (solid, no dashes) -->
      <path d="M-46,-3 Q-23,-30 -14,-22" stroke="#0891b2" stroke-width="2" fill="none"/>
      <path d="M14,-22 Q23,-30 46,-3" stroke="#0891b2" stroke-width="2" fill="none"/>
      <path d="M-46,0 Q0,30 46,0" stroke="#0891b2" stroke-width="2" fill="none"/>
      <!-- incoming wave (signal) -->
      <path d="M-78,-42 Q-70,-50 -62,-42 Q-54,-34 -46,-42" stroke="#0e7490" stroke-width="1.8" fill="none"/>
      <path d="M46,-42 Q54,-50 62,-42 Q70,-34 78,-42" stroke="#0e7490" stroke-width="1.8" fill="none"/>
    </g>

    <text x="400" y="260" fill="#083344" font-size="15" text-anchor="middle" font-weight="700">Distributed</text>
    <text x="400" y="280" fill="#083344" font-size="15" text-anchor="middle" font-weight="700">quantum sensing</text>

    <text x="400" y="310" fill="#475569" font-size="12" text-anchor="middle">Entangled sensor arrays</text>
    <text x="400" y="328" fill="#475569" font-size="12" text-anchor="middle">achieve precision past the</text>
    <text x="400" y="346" fill="#475569" font-size="12" text-anchor="middle">shot-noise limit — for clocks,</text>
    <text x="400" y="364" fill="#475569" font-size="12" text-anchor="middle">telescopes, dark-matter searches.</text>

    <text x="400" y="390" fill="#0891b2" font-size="11" text-anchor="middle" font-weight="600" letter-spacing="0.5">PRECISION</text>
  </g>

  <!-- =========================== Card 3: Quantum Key Distribution =========================== -->
  <g>
    <rect x="530" y="84" width="240" height="320" rx="12" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5"/>
    <rect x="530" y="84" width="240" height="6" rx="3" fill="#059669"/>

    <!-- Icon: Alice — secure channel — Bob with key -->
    <g transform="translate(650, 175)">
      <!-- Alice -->
      <circle cx="-60" cy="0" r="18" fill="#ffffff" stroke="#059669" stroke-width="2"/>
      <text x="-60" y="4" fill="#065f46" font-size="11" text-anchor="middle" font-weight="700">A</text>
      <!-- Bob -->
      <circle cx="60" cy="0" r="18" fill="#ffffff" stroke="#059669" stroke-width="2"/>
      <text x="60" y="4" fill="#065f46" font-size="11" text-anchor="middle" font-weight="700">B</text>
      <!-- photons traveling -->
      <line x1="-42" y1="0" x2="42" y2="0" stroke="#059669" stroke-width="2"/>
      <circle cx="-15" cy="0" r="4" fill="#10b981"/>
      <circle cx="5" cy="0" r="4" fill="#10b981"/>
      <circle cx="25" cy="0" r="4" fill="#10b981"/>
      <!-- key -->
      <g transform="translate(0,38)">
        <circle cx="-8" cy="0" r="6" fill="none" stroke="#047857" stroke-width="2"/>
        <line x1="-2" y1="0" x2="14" y2="0" stroke="#047857" stroke-width="2"/>
        <line x1="9" y1="0" x2="9" y2="5" stroke="#047857" stroke-width="2"/>
        <line x1="14" y1="0" x2="14" y2="5" stroke="#047857" stroke-width="2"/>
      </g>
      <text x="0" y="60" fill="#065f46" font-size="10" text-anchor="middle" font-style="italic">shared secret key</text>
    </g>

    <text x="650" y="260" fill="#064e3b" font-size="15" text-anchor="middle" font-weight="700">Quantum key</text>
    <text x="650" y="280" fill="#064e3b" font-size="15" text-anchor="middle" font-weight="700">distribution (QKD)</text>

    <text x="650" y="310" fill="#475569" font-size="12" text-anchor="middle">Generate a shared key whose</text>
    <text x="650" y="328" fill="#475569" font-size="12" text-anchor="middle">security rests on physics —</text>
    <text x="650" y="346" fill="#475569" font-size="12" text-anchor="middle">any eavesdropper is</text>
    <text x="650" y="364" fill="#475569" font-size="12" text-anchor="middle">forced to leave a trace.</text>

    <text x="650" y="390" fill="#059669" font-size="11" text-anchor="middle" font-weight="600" letter-spacing="0.5">SECURITY</text>
  </g>
</svg>
