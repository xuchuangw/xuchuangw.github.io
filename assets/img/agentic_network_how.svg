<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="'Inter', 'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrowDown" markerWidth="10" markerHeight="10" refX="5" refY="9" orient="auto">
      <path d="M0,0 L10,0 L5,9 Z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="34" fill="#0f172a" font-size="20" text-anchor="middle" font-weight="700">How do agentic networks work?</text>
  <text x="400" y="56" fill="#64748b" font-size="13" text-anchor="middle">Agents see partial, noisy local feedback, then communicate selectively, aggregate, and stay robust.</text>

  <!-- ======================== TOP ROW: agents with partial, noisy local feedback ======================== -->
  <text x="60" y="92" fill="#334155" font-size="12" font-weight="600">Start: partial, noisy local feedback</text>

  <!-- Agent A1 -->
  <g>
    <circle cx="150" cy="130" r="28" fill="#4338ca"/>
    <text x="150" y="127" fill="#ffffff" font-size="12" text-anchor="middle" font-weight="700">A&#8321;</text>
    <text x="150" y="142" fill="#c7d2fe" font-size="10" text-anchor="middle">agent</text>
  </g>
  <!-- Agent A2 -->
  <g>
    <circle cx="320" cy="130" r="28" fill="#4338ca"/>
    <text x="320" y="127" fill="#ffffff" font-size="12" text-anchor="middle" font-weight="700">A&#8322;</text>
    <text x="320" y="142" fill="#c7d2fe" font-size="10" text-anchor="middle">agent</text>
  </g>
  <!-- Agent A3 -->
  <g>
    <circle cx="490" cy="130" r="28" fill="#4338ca"/>
    <text x="490" y="127" fill="#ffffff" font-size="12" text-anchor="middle" font-weight="700">A&#8323;</text>
    <text x="490" y="142" fill="#c7d2fe" font-size="10" text-anchor="middle">agent</text>
  </g>
  <!-- Agent A4 -->
  <g>
    <circle cx="660" cy="130" r="28" fill="#4338ca"/>
    <text x="660" y="127" fill="#ffffff" font-size="12" text-anchor="middle" font-weight="700">A&#8324;</text>
    <text x="660" y="142" fill="#c7d2fe" font-size="10" text-anchor="middle">agent</text>
  </g>

  <!-- local-feedback badges above agents -->
  <g>
    <rect x="120" y="86" width="60" height="20" rx="10" fill="#f5f3ff" stroke="#c4b5fd"/>
    <text x="150" y="100" fill="#5b21b6" font-size="10" text-anchor="middle" font-style="italic">local &#375;&#8321;</text>
    <rect x="290" y="86" width="60" height="20" rx="10" fill="#f5f3ff" stroke="#c4b5fd"/>
    <text x="320" y="100" fill="#5b21b6" font-size="10" text-anchor="middle" font-style="italic">local &#375;&#8322;</text>
    <rect x="460" y="86" width="60" height="20" rx="10" fill="#f5f3ff" stroke="#c4b5fd"/>
    <text x="490" y="100" fill="#5b21b6" font-size="10" text-anchor="middle" font-style="italic">local &#375;&#8323;</text>
    <rect x="630" y="86" width="60" height="20" rx="10" fill="#f5f3ff" stroke="#c4b5fd"/>
    <text x="660" y="100" fill="#5b21b6" font-size="10" text-anchor="middle" font-style="italic">local &#375;&#8324;</text>
  </g>

  <!-- ======================== STEP 1: Selective communication ======================== -->
  <g>
    <!-- selective links between agents: dashed = withheld, solid = sent when informative -->
    <line x1="178" y1="130" x2="292" y2="130" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4 4"/>
    <line x1="348" y1="130" x2="462" y2="130" stroke="#4338ca" stroke-width="2.5"/>
    <line x1="518" y1="130" x2="632" y2="130" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4 4"/>
    <!-- trigger marker on the sent link -->
    <rect x="378" y="156" width="54" height="18" rx="9" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="405" y="169" fill="#3730a3" font-size="10" text-anchor="middle">send!</text>

    <line x1="400" y1="180" x2="400" y2="206" stroke="#475569" stroke-width="2" marker-end="url(#arrowDown)"/>
    <rect x="216" y="184" width="368" height="22" rx="11" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="400" y="199" fill="#9a3412" font-size="12" text-anchor="middle" font-weight="600">&#9312; Selective communication: decide WHEN and WHAT to share</text>
  </g>

  <!-- ======================== STEP 2: Aggregation and consensus ======================== -->
  <g>
    <rect x="270" y="216" width="260" height="40" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="400" y="234" fill="#312e81" font-size="12" text-anchor="middle" font-weight="700">shared view of the world</text>
    <text x="400" y="249" fill="#475569" font-size="11" text-anchor="middle" font-style="italic">averaged / leader-coordinated / distributed</text>

    <line x1="400" y1="266" x2="400" y2="292" stroke="#475569" stroke-width="2" marker-end="url(#arrowDown)"/>
    <rect x="236" y="270" width="328" height="22" rx="11" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="400" y="285" fill="#9a3412" font-size="12" text-anchor="middle" font-weight="600">&#9313; Aggregation &amp; consensus: combine local estimates</text>
  </g>

  <!-- ======================== STEP 3: Robustness ======================== -->
  <g>
    <rect x="190" y="302" width="420" height="22" rx="11" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="400" y="317" fill="#9a3412" font-size="12" text-anchor="middle" font-weight="600">&#9314; Robustness: survive heterogeneity, asynchrony, adversarial feedback</text>

    <line x1="400" y1="328" x2="400" y2="354" stroke="#475569" stroke-width="2" marker-end="url(#arrowDown)"/>
  </g>

  <!-- ======================== RESULT BADGE ======================== -->
  <g>
    <rect x="118" y="360" width="564" height="44" rx="12" fill="#ecfdf5" stroke="#6ee7b7"/>
    <text x="400" y="378" fill="#065f46" font-size="12.5" text-anchor="middle" font-weight="700">per-agent regret &#8776; single-agent optimal</text>
    <text x="400" y="395" fill="#0e7490" font-size="11.5" text-anchor="middle">while total communication grows only logarithmically with the horizon</text>
  </g>

  <!-- ======================== LEGEND (left gutter, clear of the agents row) ======================== -->
  <g>
    <circle cx="26" cy="222" r="6" fill="#4338ca"/>
    <text x="40" y="226" fill="#475569" font-size="10">agent</text>
    <line x1="20" y1="245" x2="44" y2="245" stroke="#4338ca" stroke-width="2.5"/>
    <text x="50" y="249" fill="#475569" font-size="10">message sent</text>
    <line x1="20" y1="268" x2="44" y2="268" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4 4"/>
    <text x="50" y="272" fill="#475569" font-size="10">withheld (saved)</text>
  </g>
</svg>
