<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-label="A linear Paul trap holding a chain of five ions. Two horizontal radio-frequency electrode rails run above and below the chain; amber DC endcap electrodes cap the left and right ends. Five teal ions sit evenly spaced along the central axis. Beneath them a wavy line and double-headed arrows mark a shared collective vibration, the phonon bus." style="width:100%; height:auto; font-family:sans-serif;">
  <defs>
    <marker id="t1a" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="#3b3f4a"/></marker>
  </defs>
  <!-- RF rails -->
  <rect x="150" y="58" width="430" height="16" rx="8" fill="none" stroke="#4f7cff" stroke-width="2"/>
  <rect x="150" y="286" width="430" height="16" rx="8" fill="none" stroke="#4f7cff" stroke-width="2"/>
  <text x="365" y="48" fill="#4f7cff" font-size="13" text-anchor="middle">RF electrode</text>
  <text x="365" y="324" fill="#4f7cff" font-size="13" text-anchor="middle">RF electrode (drives the spinning saddle, &#x3A9;&#8341;&#8347; &#8776; tens of MHz)</text>
  <!-- DC endcaps -->
  <rect x="120" y="150" width="16" height="60" rx="5" fill="none" stroke="#e0a106" stroke-width="2"/>
  <rect x="594" y="150" width="16" height="60" rx="5" fill="none" stroke="#e0a106" stroke-width="2"/>
  <text x="128" y="232" fill="#e0a106" font-size="12" text-anchor="middle">DC</text>
  <text x="602" y="232" fill="#e0a106" font-size="12" text-anchor="middle">DC</text>
  <!-- ion chain -->
  <line x1="186" y1="180" x2="544" y2="180" stroke="#3b3f4a" stroke-width="1" stroke-dasharray="3 5" opacity="0.45"/>
  <g>
    <circle cx="210" cy="180" r="11" fill="#14b8a6" fill-opacity="0.22" stroke="#14b8a6" stroke-width="2.4"/>
    <circle cx="280" cy="180" r="11" fill="#14b8a6" fill-opacity="0.22" stroke="#14b8a6" stroke-width="2.4"/>
    <circle cx="350" cy="180" r="11" fill="#14b8a6" fill-opacity="0.22" stroke="#14b8a6" stroke-width="2.4"/>
    <circle cx="420" cy="180" r="11" fill="#14b8a6" fill-opacity="0.22" stroke="#14b8a6" stroke-width="2.4"/>
    <circle cx="490" cy="180" r="11" fill="#14b8a6" fill-opacity="0.22" stroke="#14b8a6" stroke-width="2.4"/>
  </g>
  <text x="350" y="135" fill="#14b8a6" font-size="13" text-anchor="middle">linear ion chain &#8212; each a single atom, charge +e</text>
  <!-- shared motional mode: sine + collective arrows -->
  <path d="M186 242 q 17.9 -16 35.8 0 q 17.9 16 35.8 0 q 17.9 -16 35.8 0 q 17.9 16 35.8 0 q 17.9 -16 35.8 0 q 17.9 16 35.8 0 q 17.9 -16 35.8 0 q 17.9 16 35.8 0 q 17.9 -16 35.8 0 q 17.9 16 35.8 0" fill="none" stroke="#3b3f4a" stroke-width="2" opacity="0.65"/>
  <line x1="300" y1="266" x2="260" y2="266" stroke="#3b3f4a" stroke-width="1.4" marker-start="url(#t1a)" marker-end="url(#t1a)" opacity="0.8"/>
  <line x1="470" y1="266" x2="430" y2="266" stroke="#3b3f4a" stroke-width="1.4" marker-start="url(#t1a)" marker-end="url(#t1a)" opacity="0.8"/>
  <text x="365" y="222" fill="#3b3f4a" font-size="13" text-anchor="middle">shared motional mode (phonon) &#8212; the quantum bus every ion plugs into</text>
</svg>
