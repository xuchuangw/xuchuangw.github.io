<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" role="img" aria-label="A measurement-induced two-qubit gate on dual-rail photonic qubits. A data qubit on two rails and a pair of ancilla photons enter a linear-optics network of beam splitters and phase shifters. Two ancilla output modes go to photon-number detectors; their clicks feed forward classically to a phase-shift correction on the data output rails. The gate is heralded and succeeds only with probability less than one." style="width:100%; height:auto; font-family:sans-serif;">
  <defs>
    <marker id="p1a" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="#3b3f4a"/></marker>
  </defs>
  <!-- data qubit rails in -->
  <line x1="60" y1="110" x2="250" y2="110" stroke="#3b3f4a" stroke-width="1.6"/>
  <line x1="60" y1="150" x2="250" y2="150" stroke="#3b3f4a" stroke-width="1.6"/>
  <circle cx="92" cy="110" r="7" fill="#14b8a6" fill-opacity="0.30" stroke="#14b8a6" stroke-width="2"/>
  <text x="58" y="96" fill="#14b8a6" font-size="12.5">data qubit &#160; &#x3B1;|10&#x27E9; + &#x3B2;|01&#x27E9;</text>
  <text x="48" y="114" fill="#3b3f4a" font-size="11" text-anchor="end">a</text>
  <text x="48" y="154" fill="#3b3f4a" font-size="11" text-anchor="end">b</text>
  <!-- ancilla rails in -->
  <line x1="60" y1="250" x2="250" y2="250" stroke="#3b3f4a" stroke-width="1.6"/>
  <line x1="60" y1="290" x2="250" y2="290" stroke="#3b3f4a" stroke-width="1.6"/>
  <circle cx="92" cy="250" r="7" fill="#e0a106" fill-opacity="0.30" stroke="#e0a106" stroke-width="2"/>
  <circle cx="92" cy="290" r="7" fill="#e0a106" fill-opacity="0.30" stroke="#e0a106" stroke-width="2"/>
  <text x="58" y="320" fill="#e0a106" font-size="12.5">ancilla photons</text>
  <!-- network box -->
  <rect x="250" y="86" width="130" height="228" rx="6" fill="none" stroke="#4f7cff" stroke-width="1.8"/>
  <text x="315" y="190" fill="#4f7cff" font-size="12.5" text-anchor="middle">linear-optics</text>
  <text x="315" y="208" fill="#4f7cff" font-size="12.5" text-anchor="middle">network</text>
  <text x="315" y="228" fill="#4f7cff" font-size="10.5" text-anchor="middle">beam splitters +</text>
  <text x="315" y="242" fill="#4f7cff" font-size="10.5" text-anchor="middle">phase shifters</text>
  <!-- data outputs -->
  <line x1="380" y1="110" x2="648" y2="110" stroke="#3b3f4a" stroke-width="1.6"/>
  <line x1="380" y1="150" x2="648" y2="150" stroke="#3b3f4a" stroke-width="1.6"/>
  <!-- correction box on data rails -->
  <rect x="486" y="96" width="34" height="68" rx="4" fill="none" stroke="#3b3f4a" stroke-width="1.6"/>
  <text x="503" y="136" fill="#3b3f4a" font-size="15" text-anchor="middle">&#x3C6;</text>
  <!-- ancilla outputs to detectors -->
  <line x1="380" y1="250" x2="436" y2="250" stroke="#3b3f4a" stroke-width="1.6"/>
  <line x1="380" y1="290" x2="436" y2="290" stroke="#3b3f4a" stroke-width="1.6"/>
  <path d="M436 239 L436 261 L460 250 Z" fill="#e0a106" fill-opacity="0.25" stroke="#e0a106" stroke-width="1.8"/>
  <path d="M436 279 L436 301 L460 290 Z" fill="#e0a106" fill-opacity="0.25" stroke="#e0a106" stroke-width="1.8"/>
  <text x="470" y="254" fill="#e0a106" font-size="12">D</text>
  <text x="470" y="294" fill="#e0a106" font-size="12">D</text>
  <text x="500" y="276" fill="#e0a106" font-size="11.5">photon-number detection</text>
  <!-- feed-forward: from detector up into the correction box -->
  <polyline points="460,250 468,250 468,164 486,164" fill="none" stroke="#3b3f4a" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#p1a)" opacity="0.9"/>
  <text x="474" y="206" fill="#3b3f4a" font-size="11" text-anchor="start">feed-forward</text>
  <!-- output label -->
  <text x="654" y="116" fill="#14b8a6" font-size="11" text-anchor="start">gated</text>
  <text x="654" y="152" fill="#14b8a6" font-size="11" text-anchor="start">qubit</text>
  <text x="360" y="376" fill="#3b3f4a" font-size="13" text-anchor="middle">photons barely interact &#8212; the measurement supplies the nonlinearity; the gate is heralded, succeeding with probability p &lt; 1</text>
</svg>
