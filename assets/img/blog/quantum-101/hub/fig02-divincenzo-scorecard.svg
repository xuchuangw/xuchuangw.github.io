<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 470" role="img" aria-label="A report-card matrix scoring the five qubit platforms against the seven DiVincenzo criteria. Rows are the criteria: scalable qubits, initialization, long coherence, universal gates, measurement, flying qubits, and faithful links. Columns are superconducting, trapped ion, neutral atom, photonic, and spin and other platforms. Each cell is a filled-fraction disc, a Harvey ball, from full (meets the criterion strongly) to empty (weakly). Reading across any single row, one platform looks like the winner; reading down any single column, every platform shows at least one glaring gap. Trapped ions fill coherence, gates, and measurement but are only half-full on scaling. Neutral atoms fill scaling but trail on networking. Superconducting fills the computing criteria but is nearly empty on the two networking rows. Photonic is full on the two networking rows but weak on the computing rows, and its coherence cell is marked not-applicable because its limit is a different axis. No column is full on every row." style="width:100%; height:auto; font-family:sans-serif;">
