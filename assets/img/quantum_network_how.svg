<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <radialGradient id="endNode" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </radialGradient>
    <radialGradient id="repNode" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
    <linearGradient id="seg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#06b6d4" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="e2e" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="360" rx="16" fill="#0f172a"/>

  <!-- ===== Top row: Segment links ===== -->
  <!-- Segment lines -->
  <line x1="130" y1="100" x2="270" y2="100" stroke="url(#seg)" stroke-width="3" stroke-dasharray="8,4" filter="url(#glow2)"/>
  <line x1="330" y1="100" x2="470" y2="100" stroke="url(#seg)" stroke-width="3" stroke-dasharray="8,4" filter="url(#glow2)"/>
  <line x1="530" y1="100" x2="670" y2="100" stroke="url(#seg)" stroke-width="3" stroke-dasharray="8,4" filter="url(#glow2)"/>

  <!-- Entanglement labels on segments -->
  <text x="200" y="85" fill="#a78bfa" font-size="14" text-anchor="middle" font-style="italic">EPR</text>
  <text x="400" y="85" fill="#fbbf24" font-size="14" text-anchor="middle" font-style="italic">EPR</text>
  <text x="600" y="85" fill="#a78bfa" font-size="14" text-anchor="middle" font-style="italic">EPR</text>

  <!-- Node A (end node) -->
  <circle cx="100" cy="100" r="30" fill="url(#endNode)" filter="url(#glow2)"/>
  <text x="100" y="96" fill="white" font-size="13" text-anchor="middle" font-weight="bold">Alice</text>
  <text x="100" y="110" fill="#c4b5fd" font-size="10" text-anchor="middle">End Node</text>

  <!-- Repeater 1 -->
  <rect x="270" y="72" width="60" height="56" rx="10" fill="url(#repNode)" filter="url(#glow2)"/>
  <text x="300" y="96" fill="white" font-size="11" text-anchor="middle" font-weight="bold">Repeater</text>
  <text x="300" y="112" fill="#fef3c7" font-size="10" text-anchor="middle">R₁</text>

  <!-- Repeater 2 -->
  <rect x="470" y="72" width="60" height="56" rx="10" fill="url(#repNode)" filter="url(#glow2)"/>
  <text x="500" y="96" fill="white" font-size="11" text-anchor="middle" font-weight="bold">Repeater</text>
  <text x="500" y="112" fill="#fef3c7" font-size="10" text-anchor="middle">R₂</text>

  <!-- Node B (end node) -->
  <circle cx="700" cy="100" r="30" fill="url(#endNode)" filter="url(#glow2)"/>
  <text x="700" y="96" fill="white" font-size="13" text-anchor="middle" font-weight="bold">Bob</text>
  <text x="700" y="110" fill="#c4b5fd" font-size="10" text-anchor="middle">End Node</text>

  <!-- ===== Arrow down: Entanglement Swapping ===== -->
  <text x="400" y="165" fill="#94a3b8" font-size="13" text-anchor="middle" letter-spacing="1">▼  ENTANGLEMENT SWAPPING  ▼</text>

  <!-- ===== Bottom row: End-to-end entanglement ===== -->
  <path d="M130,250 Q400,210 670,250" stroke="url(#e2e)" stroke-width="4" fill="none" filter="url(#glow2)"/>
  <text x="400" y="222" fill="#22d3ee" font-size="15" text-anchor="middle" font-weight="bold">End-to-End Entanglement</text>
  <text x="400" y="240" fill="#67e8f9" font-size="13" text-anchor="middle" font-style="italic">|Φ⁺⟩</text>

  <!-- End nodes (bottom) -->
  <circle cx="100" cy="250" r="30" fill="url(#endNode)" filter="url(#glow2)"/>
  <text x="100" y="246" fill="white" font-size="13" text-anchor="middle" font-weight="bold">Alice</text>
  <text x="100" y="260" fill="#c4b5fd" font-size="10" text-anchor="middle">End Node</text>

  <circle cx="700" cy="250" r="30" fill="url(#endNode)" filter="url(#glow2)"/>
  <text x="700" y="246" fill="white" font-size="13" text-anchor="middle" font-weight="bold">Bob</text>
  <text x="700" y="260" fill="#c4b5fd" font-size="10" text-anchor="middle">End Node</text>

  <!-- Distillation label -->
  <text x="400" y="275" fill="#94a3b8" font-size="12" text-anchor="middle">+ Entanglement Distillation → High-Fidelity Link</text>

  <!-- Process labels at bottom -->
  <rect x="130" y="305" width="170" height="30" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="215" y="325" fill="#a78bfa" font-size="12" text-anchor="middle">① Generation</text>

  <rect x="315" y="305" width="170" height="30" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="400" y="325" fill="#fbbf24" font-size="12" text-anchor="middle">② Swapping</text>

  <rect x="500" y="305" width="170" height="30" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="585" y="325" fill="#34d399" font-size="12" text-anchor="middle">③ Distillation</text>

  <!-- Title -->
  <text x="400" y="350" fill="#94a3b8" font-size="14" text-anchor="middle" letter-spacing="2">QUANTUM REPEATER CHAIN</text>
</svg>
