<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="'Inter', 'Segoe UI', Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="440" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="36" fill="#0f172a" font-size="20" text-anchor="middle" font-weight="700">Why agentic networks?</text>
  <text x="400" y="58" fill="#64748b" font-size="13" text-anchor="middle">Three flagship application areas drive the field.</text>

  <!-- =========================== Card 1: Learning at scale =========================== -->
  <g>
    <rect x="30" y="84" width="240" height="320" rx="12" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
    <rect x="30" y="84" width="240" height="6" rx="3" fill="#7c3aed"/>

    <!-- Icon: many small agents pooling into one shared store -->
    <g transform="translate(150, 175)">
      <!-- shared store -->
      <rect x="-26" y="-8" width="52" height="44" rx="6" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
      <ellipse cx="0" cy="-8" rx="26" ry="7" fill="#eef2ff" stroke="#7c3aed" stroke-width="2"/>
      <path d="M-26,-8 v22 a26,7 0 0 0 52,0 v-22" fill="none" stroke="#7c3aed" stroke-width="2"/>
      <line x1="-26" y1="14" x2="26" y2="14" stroke="#a78bfa" stroke-width="1.2"/>
      <text x="0" y="55" fill="#5b21b6" font-size="10" text-anchor="middle" font-weight="700">shared experience</text>
      <!-- agents -->
      <circle cx="-62" cy="-30" r="11" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
      <circle cx="-62" cy="-30" r="3.5" fill="#7c3aed"/>
      <circle cx="62" cy="-30" r="11" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
      <circle cx="62" cy="-30" r="3.5" fill="#7c3aed"/>
      <circle cx="-66" cy="12" r="11" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
      <circle cx="-66" cy="12" r="3.5" fill="#7c3aed"/>
      <circle cx="66" cy="12" r="11" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
      <circle cx="66" cy="12" r="3.5" fill="#7c3aed"/>
      <!-- pooling arrows into the store -->
      <line x1="-51" y1="-28" x2="-24" y2="-14" stroke="#7c3aed" stroke-width="2"/>
      <line x1="51" y1="-28" x2="24" y2="-14" stroke="#7c3aed" stroke-width="2"/>
      <line x1="-55" y1="12" x2="-26" y2="6" stroke="#7c3aed" stroke-width="2"/>
      <line x1="55" y1="12" x2="26" y2="6" stroke="#7c3aed" stroke-width="2"/>
      <line x1="-51" y1="-28" x2="-24" y2="-14" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3,3"/>
    </g>

    <text x="150" y="260" fill="#1e1b4b" font-size="15" text-anchor="middle" font-weight="700">Learning</text>
    <text x="150" y="280" fill="#1e1b4b" font-size="15" text-anchor="middle" font-weight="700">at scale</text>

    <text x="150" y="310" fill="#475569" font-size="12" text-anchor="middle">Many agents pool one shared</text>
    <text x="150" y="328" fill="#475569" font-size="12" text-anchor="middle">stream of experience and</text>
    <text x="150" y="346" fill="#475569" font-size="12" text-anchor="middle">converge far faster than</text>
    <text x="150" y="364" fill="#475569" font-size="12" text-anchor="middle">any lone learner could.</text>

    <text x="150" y="390" fill="#7c3aed" font-size="11" text-anchor="middle" font-weight="600" letter-spacing="0.5">SCALE</text>
  </g>

  <!-- =========================== Card 2: Heterogeneous teams =========================== -->
  <g>
    <rect x="280" y="84" width="240" height="320" rx="12" fill="#ecfeff" stroke="#67e8f9" stroke-width="1.5"/>
    <rect x="280" y="84" width="240" height="6" rx="3" fill="#0891b2"/>

    <!-- Icon: differently-shaped agents converging on one target -->
    <g transform="translate(400, 175)">
      <!-- shared target/goal -->
      <circle cx="0" cy="6" r="16" fill="#ffffff" stroke="#0891b2" stroke-width="2"/>
      <circle cx="0" cy="6" r="9" fill="none" stroke="#0e7490" stroke-width="2"/>
      <circle cx="0" cy="6" r="3" fill="#0891b2"/>
      <text x="0" y="46" fill="#0e7490" font-size="10" text-anchor="middle" font-weight="700">one goal</text>
      <!-- heterogeneous agents (circle, square, triangle) -->
      <circle cx="-62" cy="-30" r="12" fill="#ffffff" stroke="#0891b2" stroke-width="2"/>
      <rect x="50" y="-42" width="24" height="24" rx="4" fill="#ffffff" stroke="#0891b2" stroke-width="2"/>
      <path d="M0,-50 L13,-28 L-13,-28 Z" fill="#ffffff" stroke="#0891b2" stroke-width="2"/>
      <!-- convergence arrows toward target -->
      <line x1="-52" y1="-22" x2="-12" y2="0" stroke="#0891b2" stroke-width="2"/>
      <polygon points="-12,0 -20,-1 -17,-7" fill="#0891b2"/>
      <line x1="52" y1="-22" x2="12" y2="0" stroke="#0891b2" stroke-width="2"/>
      <polygon points="12,0 20,-1 17,-7" fill="#0891b2"/>
      <line x1="0" y1="-28" x2="0" y2="-12" stroke="#0891b2" stroke-width="2"/>
      <polygon points="0,-12 -4,-19 4,-19" fill="#0891b2"/>
    </g>

    <text x="400" y="260" fill="#083344" font-size="15" text-anchor="middle" font-weight="700">Heterogeneous</text>
    <text x="400" y="280" fill="#083344" font-size="15" text-anchor="middle" font-weight="700">teams</text>

    <text x="400" y="310" fill="#475569" font-size="12" text-anchor="middle">Agents with different sensors,</text>
    <text x="400" y="328" fill="#475569" font-size="12" text-anchor="middle">action sets, and rewards</text>
    <text x="400" y="346" fill="#475569" font-size="12" text-anchor="middle">coordinate toward one goal —</text>
    <text x="400" y="364" fill="#475569" font-size="12" text-anchor="middle">the regime that matters.</text>

    <text x="400" y="390" fill="#0891b2" font-size="11" text-anchor="middle" font-weight="600" letter-spacing="0.5">DIVERSITY</text>
  </g>

  <!-- =========================== Card 3: Aligned LLM agents =========================== -->
  <g>
    <rect x="530" y="84" width="240" height="320" rx="12" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5"/>
    <rect x="530" y="84" width="240" height="6" rx="3" fill="#059669"/>

    <!-- Icon: several LLM bubbles pointing to a single user -->
    <g transform="translate(650, 175)">
      <!-- LLM bubbles -->
      <g transform="translate(-58,-34)">
        <rect x="-20" y="-12" width="40" height="24" rx="7" fill="#ffffff" stroke="#059669" stroke-width="2"/>
        <text x="0" y="5" fill="#065f46" font-size="10" text-anchor="middle" font-weight="700">LLM</text>
        <path d="M-6,12 L0,18 L6,12 Z" fill="#ffffff" stroke="#059669" stroke-width="2"/>
      </g>
      <g transform="translate(58,-34)">
        <rect x="-20" y="-12" width="40" height="24" rx="7" fill="#ffffff" stroke="#059669" stroke-width="2"/>
        <text x="0" y="5" fill="#065f46" font-size="10" text-anchor="middle" font-weight="700">LLM</text>
        <path d="M-6,12 L0,18 L6,12 Z" fill="#ffffff" stroke="#059669" stroke-width="2"/>
      </g>
      <g transform="translate(0,-46)">
        <rect x="-20" y="-12" width="40" height="24" rx="7" fill="#ffffff" stroke="#059669" stroke-width="2"/>
        <text x="0" y="5" fill="#065f46" font-size="10" text-anchor="middle" font-weight="700">LLM</text>
        <path d="M-6,12 L0,18 L6,12 Z" fill="#ffffff" stroke="#059669" stroke-width="2"/>
      </g>
      <!-- single user -->
      <circle cx="0" cy="24" r="9" fill="#ffffff" stroke="#059669" stroke-width="2"/>
      <path d="M-13,44 a13,11 0 0 1 26,0 Z" fill="#ffffff" stroke="#059669" stroke-width="2"/>
      <!-- arrows from bubbles to the user -->
      <line x1="-50" y1="-16" x2="-9" y2="16" stroke="#10b981" stroke-width="2"/>
      <polygon points="-9,16 -17,13 -13,8" fill="#10b981"/>
      <line x1="50" y1="-16" x2="9" y2="16" stroke="#10b981" stroke-width="2"/>
      <polygon points="9,16 17,13 13,8" fill="#10b981"/>
      <line x1="0" y1="-22" x2="0" y2="13" stroke="#10b981" stroke-width="2"/>
      <polygon points="0,13 -4,6 4,6" fill="#10b981"/>
      <text x="0" y="62" fill="#065f46" font-size="10" text-anchor="middle" font-weight="700">one user</text>
    </g>

    <text x="650" y="260" fill="#064e3b" font-size="15" text-anchor="middle" font-weight="700">Aligned</text>
    <text x="650" y="280" fill="#064e3b" font-size="15" text-anchor="middle" font-weight="700">LLM agents</text>

    <text x="650" y="310" fill="#475569" font-size="12" text-anchor="middle">A population of LLMs jointly</text>
    <text x="650" y="328" fill="#475569" font-size="12" text-anchor="middle">evaluate, rank, and align</text>
    <text x="650" y="346" fill="#475569" font-size="12" text-anchor="middle">their outputs to one user —</text>
    <text x="650" y="364" fill="#475569" font-size="12" text-anchor="middle">a model zoo made coherent.</text>

    <text x="650" y="390" fill="#059669" font-size="11" text-anchor="middle" font-weight="600" letter-spacing="0.5">ALIGNMENT</text>
  </g>
</svg>
